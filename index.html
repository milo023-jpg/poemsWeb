<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Poema del Día</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><text y='0.9em' font-size='100'>💜</text></svg>">
  <link rel="stylesheet" href="css/styles.css?v=2">
  
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "1ec579bf-552f-4e70-9900-4e6bc28b63a5",
        promptOptions: {
          slidedown: {
            enabled: true,
            actionMessage: "¿Quieres recibir el poema del día a las 9am?",
            acceptButtonText: "Sí, activar",
            cancelButtonText: "No",
          }
        }
      });

      // Mostrar el prompt al cargar (si el navegador lo permite)
      OneSignal.Slidedown.promptPush();
    });
  </script>
  
</head>
<body>
  <button id="btnNoti">Activar notificaciones</button>
  <main class="contenedor-principal">
    <div class="card">
      <h1>💐 Poema del Día 💐</h1>
      <section id="poema-container">
        <h2 id="titulo"></h2>
        <p id="texto"></p>
      </section>
  
      <h2>🌸 Lista de Poemas Vistos 🌸</h2>
      <p id="contador-poemas" class="contador"></p>
      <ul id="lista-poemas"></ul>
  
  
      <footer>Hecho con amor para ti ❤️</footer>
    </div>
  </main>

  <div class="hearts"></div>

  <script type="module" src="js/main.js"></script>
  <script>
    // Bloquea por completo el desplazamiento táctil
    document.addEventListener('touchmove', (e) => {
      if (!e.target.closest('#lista-poemas')) {
        e.preventDefault(); // bloquea el resto
      }
    }, { passive: false });
  </script>
  <script>
    document.getElementById("btnNoti").addEventListener("click", async () => {
      const OneSignal = await window.OneSignalDeferred?.[0]?.promise?.catch(()=>null);
    });
  </script>
</body>
</html>
